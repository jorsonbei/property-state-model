version: psm_v0

risk_levels:
  low:
    description: 低风险语言和格式任务。
    route: direct_language
    required_judges: []
  medium:
    description: 事实、普通代码、轻量分析任务。
    route: retrieval_or_tool_check
    required_judges:
      - source_or_tool_check
  high:
    description: 会影响资金、生产、科研结论、组织行动的任务。
    route: audited_generation
    required_judges:
      - domain_specific_check
      - bsigma_audit
      - boundary_statement
  critical:
    description: 医疗、法律、实盘交易、生命安全、不可逆工程发布。
    route: external_judge_and_human_confirmation
    required_judges:
      - external_judge
      - human_confirmation
      - failure_ledger

routes:
  direct_language:
    allowed_statement_level: C1
    output_rule: 可以直接输出，但仍需标注这是语言层结果。
  retrieval_or_tool_check:
    allowed_statement_level: C2
    output_rule: 必须说明来源、工具或验证缺口。
  audited_generation:
    allowed_statement_level: C3
    output_rule: 必须输出 Q 核、Ω、B_sigma 风险、下一步验证。
  external_judge_and_human_confirmation:
    allowed_statement_level: C4
    output_rule: 只能输出协议、边界和待裁判事项，不能冒充最终结论。

domain_defaults:
  general: medium
  writing: low
  code_engineering: high
  research: high
  business_decision: high
  trading: critical
  medical: critical
  legal: critical
  wuxing_theory: high
